name: Build Windows Collector
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix cross-platform imports
        shell: pwsh
        run: |
          # Remove Linux-only use std::os::unix::io::AsRawFd from canbus.rs (causes Windows build failure)
          $file = "neuron-collector/collector-driver/src/canbus.rs"
          (Get-Content $file) -replace '        use std::os::unix::io::AsRawFd;', '' | Set-Content $file
          Write-Host "Fixed canbus.rs for Windows build"
      - name: Remove stale cargo config
        shell: pwsh
        run: |
          if (Test-Path "neuron-collector/.cargo/config.toml") { Remove-Item "neuron-collector/.cargo/config.toml" }
      - name: Install Rust
        run: |
          rustup toolchain install stable --target x86_64-pc-windows-msvc
          rustup default stable
      - name: Build
        run: |
          cd neuron-collector
          cargo build --release -p collector-bin --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          $exe = Get-ChildItem -Recurse -Filter "collector-bin.exe" -Path "neuron-collector/target" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName release/
            if (Test-Path "neuron-collector/config.toml") { Copy-Item "neuron-collector/config.toml" release/ }
            Compress-Archive -Path release/* -DestinationPath neuron-collector-windows.zip
            Write-Host "Package created: neuron-collector-windows.zip"
          } else {
            Write-Host "No exe found, check build logs"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: neuron-collector-windows
          path: neuron-collector-windows.zip
