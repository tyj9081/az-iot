name: Build Windows Collector
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --target x86_64-pc-windows-msvc
          rustup default stable
      - name: Build
        run: |
          cd neuron-collector
          cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item "neuron-collector/target/x86_64-pc-windows-msvc/release/collector-bin.exe" release/
          Copy-Item "neuron-collector/config.toml" release/ 2>$null
          Compress-Archive -Path release/* -DestinationPath neuron-collector-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: neuron-collector-windows
          path: neuron-collector-windows.zip
