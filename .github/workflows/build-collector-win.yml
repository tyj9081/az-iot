name: Build Windows Collector
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --target x86_64-pc-windows-msvc
          rustup default stable
      - name: Build
        run: |
          cd neuron-collector
          cargo build --release -p collector-bin 2>&1
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Get-ChildItem -Recurse -Filter "collector-bin.exe" -Path "neuron-collector/target" | ForEach-Object {
            Copy-Item $_.FullName release/
          }
          if (Test-Path "neuron-collector/config.toml") { Copy-Item "neuron-collector/config.toml" release/ }
          if ((Get-ChildItem release -Filter *.exe | Measure-Object).Count -gt 0) {
            Compress-Archive -Path release/* -DestinationPath neuron-collector-windows.zip
          } else {
            Write-Host "No exe found, check build logs"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: neuron-collector-windows
          path: neuron-collector-windows.zip
