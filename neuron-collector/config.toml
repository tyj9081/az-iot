# AZ-IOT Collector 配置文件
# 部署时改名为 config.toml 放到 collector-bin.exe 同目录

[mqtt]
# EMQX MQTT Broker 地址
broker = "tcp://8.163.61.99:1883"
# 采集器唯一标识 (多台采集器时不能重复)
client_id = "collector-win10-01"
# MQTT 认证凭据
username = "neuron-collector"
password = "***"
# MQTT Topic 前缀, 上报到 neuron/{device_id}/latest
topic_prefix = "neuron"

[fallback]
# MQTT 断连时的 WebSocket 备用上报通道
ws_url = "ws://8.163.61.99:8080/ws/collector"
# 是否启用备用通道
enabled = true
