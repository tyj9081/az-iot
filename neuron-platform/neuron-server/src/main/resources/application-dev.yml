# 本地开发环境配置
# 启动方式: java -jar app.jar --spring.profiles.active=dev
# 或设置环境变量 SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/az_iot?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  secret: dev-only-jwt-secret-key-at-least-256-bits-long-for-local-development
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8080

logging:
  level:
    com.aziot: DEBUG
